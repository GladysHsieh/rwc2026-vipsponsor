<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RWC 2026 VIP Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;800&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 基礎樣式 --- */
        body {
            margin: 0; padding: 0; background-color: #555;
            font-family: 'Noto Sans TC', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        .container {
            width: 95%; max-width: 1100px; background-color: white;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
            display: flex; flex-direction: column; margin: 20px auto;
        }

        /* --- 1. Header (主辦單位) --- */
        .header {
            background-color: white; padding: 15px 35px;
            display: flex; justify-content: center; align-items: center;
            flex-wrap: wrap; gap: 20px; border-bottom: 1px solid #eee;
        }
        .header img { height: 45px; width: auto; object-fit: contain; }

        /* --- 2. Main Content (視覺主體) --- */
        .main-content {
            flex: 1; padding: 40px 50px; color: white;
            background-color: #222;
            background-image: url('images/bg.png'); /* 修正路徑 */
            background-size: cover; background-position: center;
        }

        .title-area { text-align: center; margin-bottom: 30px; }
        h1 { font-family: 'Montserrat', sans-serif; font-size: 32px; color: #FFD700; text-shadow: 2px 2px 5px rgba(0,0,0,0.9); margin: 0; }
        h2 { font-size: 24px; border-bottom: 3px solid #FFD700; padding-bottom: 5px; display: inline-block; margin-top: 10px; }

        .salutation-area { text-align: center; font-size: 20px; font-weight: bold; margin: 20px 0; text-shadow: 1px 1px 3px rgba(0,0,0, 0.9); }

        /* --- 佈局控制 --- */
        .content-row { display: flex; gap: 30px; align-items: stretch; margin-top: 20px; }
        
        /* 左側資訊欄 */
        .info-col {
            flex: 1.5; background: rgba(255,255,255, 0.1);
            backdrop-filter: blur(5px); padding: 25px;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
        }
        .info-label { color: #FFD700; font-weight: 800; font-size: 13px; display: block; margin-bottom: 5px; }
        .info-value { font-size: 15px; line-height: 1.5; margin-bottom: 15px; display: block; }
        .qr-img { width: 100px; height: 100px; background: white; padding: 5px; margin-top: 10px; }

        /* 行事曆按鈕 */
        .cal-btn {
            display: inline-block; padding: 10px 15px; background-color: #FFD700;
            color: #800000; text-decoration: none; border-radius: 5px;
            font-weight: bold; font-size: 14px; margin-top: 10px; width: 100%; text-align: center; box-sizing: border-box;
        }

        /* 右側主文欄 */
        .message-col { flex: 3; }
        .message-box-container { background: rgba(0,0,0, 0.5); padding: 30px; border-radius: 12px; height: 100%; }
        .message-split { display: flex; gap: 30px; }
        .msg-en, .msg-zh { flex: 1; font-size: 14px; line-height: 1.7; }
        .msg-en { border-right: 1px solid rgba(255,255,255, 0.3); padding-right: 20px; }
        .msg-signature { margin-top: 20px; color: #FFD700; font-weight: bold; }

        /* --- 3. Footer (贊助商) --- */
        .footer { background: white; padding: 20px 40px; border-top: 5px solid #800000; }
        .sponsor-logos { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 15px 25px; }
        .sponsor-logos img { height: auto; max-height: 30px; }

        /* --- 列印優化 --- */
        @media print {
            .cal-btn { display: none !important; }
            .container { width: 100%; box-shadow: none; margin: 0; }
            .main-content { -webkit-print-color-adjust: exact; background-color: #222 !important; }
            .footer { -webkit-print-color-adjust: exact; background: white !important; }
        }

        @media screen and (max-width: 900px) {
            .content-row { flex-direction: column; }
            .message-split { flex-direction: column; }
            .msg-en { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 20px; }
        }
    </style>
</head>
